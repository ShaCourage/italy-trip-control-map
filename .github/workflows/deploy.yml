name: Deploy to GitHub Pages

# 저장소 공개 전환 후 활성화됨(2026-06-11). main 푸시마다 자동 배포 + 수동 실행 가능.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  # GitHub-hosted runners switch JavaScript actions to Node 24 by default from 2026-06-16.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # Pages가 비활성이어도 첫 실행에서 자동 활성화 (REST API 권한 없이)
      - uses: actions/configure-pages@v6
        with:
          enablement: true
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # 프로젝트 페이지는 /<repo>/ 하위 경로에서 서빙되므로 base를 지정해 빌드
      - run: npm run build -- --base=/italy-trip-control-map/
      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
